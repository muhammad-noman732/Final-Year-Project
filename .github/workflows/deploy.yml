name: Build and Deploy

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker images
              run: |
                  docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/unisync:latest .
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/unisync:latest
                  docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/unisync-ml:latest -f ML/Dockerfile .
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/unisync-ml:latest

            - name: Deploy to server
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_IP }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      cd ~/myproject
                      git pull origin main
                      docker compose pull nextjs fastapi-ml
                      docker compose up -d --force-recreate nextjs fastapi-ml